appId: com.openclaw.manager
productName: OpenClaw Manager
directories:
  output: release
icon: build/icon.ico
win:
  icon: build/icon.ico
  target:
    - 7z
  artifactName: ${productName}-${version}.${ext}
extraResources:
  - from: ./resources/
    to: resources/
    filter:
      - "**/*"
  - from: ./build/
    to: resources/
    filter:
      - "icon.ico"
