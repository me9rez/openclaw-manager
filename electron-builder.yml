appId: com.openclaw.manager
productName: OpenClaw Manager
electronVersion: "43.1.1"
directories:
  output: release
icon: assets/icon.ico
win:
  icon: assets/icon.ico
  target:
    - 7z
  artifactName: ${productName}-${version}.${ext}
extraResources:
  - from: ./resources/
    to: .
    filter:
      - "**/*"
  - from: ./assets/
    to: .
    filter:
      - "**/*"
